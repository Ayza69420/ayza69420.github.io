<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Library Player</title>
    <style>
        :root {
            --bg: #0d0e12;
            --surface: #181a22;
            --primary: #9b51e0; /* Clean purple accent */
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin-top: 20px;
        }

        .player-wrapper {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            aspect-ratio: 16 / 9;
            position: relative;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .playlist-container {
            margin-top: 20px;
            background: var(--surface);
            border-radius: 12px;
            padding: 15px;
        }

        h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid #2d313f; padding-bottom: 10px; }

        #playlist {
            list-style: none;
            padding: 0;
            max-height: 350px;
            overflow-y: auto;
            margin: 0;
        }

        .video-item {
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            border-bottom: 1px solid #2d313f;
            display: flex;
            align-items: center;
        }

        .video-item:hover { background: #232733; }
        .video-item.active { background: #9b51e022; color: var(--primary); font-weight: bold; }
        
        .video-item::before {
            content: "▶";
            margin-right: 12px;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        #playlist::-webkit-scrollbar { width: 6px; }
        #playlist::-webkit-scrollbar-thumb { background: #3f4459; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="player-wrapper">
        <!-- Filemoon frame targets are embedded securely through allowfullscreen -->
        <iframe id="videoPlayer" src="" allowfullscreen="true" scrolling="no"></iframe>
    </div>

    <div class="playlist-container">
        <h2 id="currentTitle">Select From Menu</h2>
        <ul id="playlist">
            <li class="video-item" style="pointer-events: none;">Loading cloud library...</li>
        </ul>
    </div>
</div>

<script>
    const player = document.getElementById('videoPlayer');
    const playlistEl = document.getElementById('playlist');
    const titleEl = document.getElementById('currentTitle');

    async function loadLibrary() {
        try {
            const response = await fetch('./playlist.json');
            const videos = await response.json();

            if (!videos || videos.length === 0) {
                playlistEl.innerHTML = '<li class="video-item" style="pointer-events:none;">Your library index is empty.</li>';
                return;
            }

            renderPlaylist(videos);
        } catch (error) {
            console.error('Error reading playlist.json:', error);
            playlistEl.innerHTML = '<li class="video-item" style="pointer-events:none;">Error loading library config</li>';
        }
    }

    function renderPlaylist(videos) {
        playlistEl.innerHTML = '';
        
        videos.forEach((video, index) => {
            const li = document.createElement('li');
            li.className = 'video-item';
            li.textContent = video.title;
            
            li.onclick = () => {
                player.src = video.url;
                titleEl.textContent = `Playing: ${video.title}`;
                document.querySelectorAll('.video-item').forEach(el => el.classList.remove('active'));
                li.classList.add('active');
            };

            playlistEl.appendChild(li);

            if (index === 0) {
                player.src = video.url;
                titleEl.textContent = `Up Next: ${video.title}`;
                li.classList.add('active');
            }
        });
    }

    loadLibrary();
</script>

</body>
</html>

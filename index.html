<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Repo Video Player</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1e1e1e;
            --primary: #3ea6ff;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin-top: 20px;
        }

        /* Player Section */
        .player-wrapper {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            aspect-ratio: 16 / 9;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Playlist Section */
        .playlist-container {
            margin-top: 20px;
            background: var(--surface);
            border-radius: 12px;
            padding: 15px;
        }

        h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid #333; padding-bottom: 10px; }

        #playlist {
            list-style: none;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .video-item {
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
        }

        .video-item:hover { background: #333; }
        .video-item.active { background: #3ea6ff22; color: var(--primary); font-weight: bold; }
        
        .video-item::before {
            content: "▶";
            margin-right: 12px;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        /* Scrollbar styling */
        #playlist::-webkit-scrollbar { width: 6px; }
        #playlist::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="player-wrapper">
        <video id="videoPlayer" controls>
            Your browser does not support the video tag.
        </video>
    </div>

    <div class="playlist-container">
        <h2 id="currentTitle">Select a Video</h2>
        <ul id="playlist">
            <li class="video-item">Loading videos from repository...</li>
        </ul>
    </div>
</div>

<script>
    const repoOwner = 'ayza69420';
    const repoName = 'ayza69420.github.io';
    const videoExtensions = ['.mp4', '.webm', '.ogg', '.mov'];

    const player = document.getElementById('videoPlayer');
    const playlistEl = document.getElementById('playlist');
    const titleEl = document.getElementById('currentTitle');

    async function fetchVideos() {
        try {
            // Fetch file list from GitHub API
            const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/`);
            const files = await response.json();

            // Filter for video files only
            const videos = files.filter(file => 
                videoExtensions.some(ext => file.name.toLowerCase().endsWith(ext))
            );

            if (videos.length === 0) {
                playlistEl.innerHTML = '<li class="video-item">No videos found in repository root.</li>';
                return;
            }

            renderPlaylist(videos);
        } catch (error) {
            console.error('Error fetching videos:', error);
            playlistEl.innerHTML = '<li class="video-item">Error loading videos. Check console.</li>';
        }
    }

    function renderPlaylist(videos) {
        playlistEl.innerHTML = '';
        
        videos.forEach((video, index) => {
            const li = document.createElement('li');
            li.className = 'video-item';
            li.textContent = video.name;
            
            li.onclick = () => {
                // Update Player
                player.src = video.download_url;
                player.play();
                
                // Update UI
                titleEl.textContent = `Playing: ${video.name}`;
                document.querySelectorAll('.video-item').forEach(el => el.classList.remove('active'));
                li.classList.add('active');
            };

            playlistEl.appendChild(li);

            // Auto-load the first video (optional)
            if (index === 0) {
                player.src = video.download_url;
                titleEl.textContent = `Next up: ${video.name}`;
            }
        });
    }

    fetchVideos();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Litterbox Stream Library</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #141419;
            --primary: #ff79c6; /* Neon pink accent */
            --text: #f8f8f2;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 960px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .player-wrapper {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            aspect-ratio: 16 / 9;
            width: 100%;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
        }

        .playlist-container {
            background: var(--surface);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        h2 { 
            margin-top: 0; 
            font-size: 1.2rem; 
            border-bottom: 2px solid #282a36; 
            padding-bottom: 12px;
            color: var(--primary);
            letter-spacing: 0.5px;
        }

        #playlist {
            list-style: none;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
            margin: 0;
        }

        .video-item {
            padding: 14px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid #282a36;
            display: flex;
            align-items: center;
            font-size: 0.95rem;
        }

        .video-item:hover { 
            background: #21222c; 
            padding-left: 22px;
        }

        .video-item.active { 
            background: #ff79c615; 
            color: var(--primary); 
            font-weight: bold;
            border-left: 4px solid var(--primary);
            padding-left: 18px;
        }
        
        .video-item::before {
            content: "▶";
            margin-right: 12px;
            font-size: 0.75rem;
            opacity: 0.6;
        }

        #playlist::-webkit-scrollbar { width: 6px; }
        #playlist::-webkit-scrollbar-thumb { background: #44475a; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="player-wrapper">
        <video id="videoPlayer" controls>
            Your browser does not support the video tag.
        </video>
    </div>

    <div class="playlist-container">
        <h2 id="currentTitle">Select a Stream</h2>
        <ul id="playlist">
            <li class="video-item" style="pointer-events: none;">Loading library links...</li>
        </ul>
    </div>
</div>

<script>
    const player = document.getElementById('videoPlayer');
    const playlistEl = document.getElementById('playlist');
    const titleEl = document.getElementById('currentTitle');

    async function loadLibrary() {
        try {
            // Added cache-busting parameter (?t=...) to force browser to read new changes immediately
            const response = await fetch('./playlist.json?t=' + Date.now());
            if (!response.ok) throw new Error('Could not find playlist.json file');
            
            const videos = await response.json();

            if (!videos || videos.length === 0) {
                playlistEl.innerHTML = '<li class="video-item" style="pointer-events:none;">The playlist array is empty.</li>';
                return;
            }

            renderPlaylist(videos);
        } catch (error) {
            console.error('Error loading library:', error);
            playlistEl.innerHTML = `<li class="video-item" style="pointer-events:none; color:#ff5555;">Failed to load links: ${error.message}</li>`;
        }
    }

    function renderPlaylist(videos) {
        playlistEl.innerHTML = '';
        
        videos.forEach((video, index) => {
            const li = document.createElement('li');
            li.className = 'video-item';
            li.textContent = video.title;
            
            li.onclick = () => {
                player.src = video.url;
                player.load(); // Forces native player to rebuild buffer frame elements
                player.play().catch(e => console.log("Autoplay blocked, waiting for user input click."));
                titleEl.textContent = `Playing: ${video.title}`;
                document.querySelectorAll('.video-item').forEach(el => el.classList.remove('active'));
                li.classList.add('active');
            };

            playlistEl.appendChild(li);

            if (index === 0) {
                player.src = video.url;
                titleEl.textContent = `Up Next: ${video.title}`;
                li.classList.add('active');
            }
        });
    }

    loadLibrary();
</script>

</body>
</html>
